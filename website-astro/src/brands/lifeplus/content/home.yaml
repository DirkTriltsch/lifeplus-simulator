hero:
  eyebrow: "Vergütungs-Simulator"
  claim: "Sieh deinen Vergütungsplan, bevor du planst."
  subClaim: "Simuliere realistisch, was dein LifePlus-Netzwerk über zehn Jahre einspielen kann."
  ctaLabel: "Simulator starten"
  ctaUrl: "/app/"

trustStrip:
  headline: "Warum LifeFlow360"
  items:
    - "Realistische Wachstumsmodelle"
    - "Transparente Annahmen, keine Versprechen"
    - "Über 10 Jahre planbar"

coreMessage:
  headline: "Planen statt hoffen."
  body: "Der LifePlus-Simulator zeigt dir, was dein Netzwerk realistisch einspielen kann — auf Basis transparenter Modelle und deiner eigenen Eingaben."

featureTeaser:
  headline: "Was du erwarten kannst"
  items:
    - title: "Realistische Wachstumsmodelle"
      body: "Vier Stufen von vorsichtig bis ambitioniert. Du behältst die Kontrolle."
    - title: "Klare Annahmen"
      body: "Jeder Parameter ist sichtbar, jederzeit veränderbar und nachvollziehbar."
    - title: "Über 10 Jahre planbar"
      body: "Sieh, wie sich Entscheidungen langfristig auswirken — nicht nur im ersten Monat."

pricingTeaser:
  headline: "Einfache Preise"
  body: "Monatlich oder jährlich. Jederzeit kündbar. Keine versteckten Kosten."
  ctaLabel: "Preise ansehen"
  ctaUrl: "/pricing"

faq:
  headline: "Häufige Fragen"
  items:
    - q: "Ist das eine Garantie für meine Provision?"
      a: "Nein. Die Simulation zeigt Szenarien auf Basis deiner Eingaben und der hinterlegten Modellannahmen."
    - q: "Kann ich mehrere Szenarien vergleichen?"
      a: "Ja. Du kannst Parameter ändern und die Auswirkungen direkt im Verlauf sehen."
    - q: "Funktioniert das für mein Team-Setup?"
      a: "Ja. Du gibst die Struktur deines Netzwerks vor — der Simulator rechnet auf Basis dieser Annahmen."

finalCta:
  headline: "Bereit zu planen?"
  body: "Starte deine erste Simulation in unter zwei Minuten."
  ctaLabel: "Jetzt starten"
  ctaUrl: "/app/"
