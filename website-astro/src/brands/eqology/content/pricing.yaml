faq:
  headlineHtml: "Fragen zur <em>Abrechnung.</em>"
  items:
    - q: "Wie kann ich kündigen?"
      a:
        - "Im <strong>1-Monats-Abo</strong> kündigst du monatlich — ein Klick im Account-Bereich genügt, keine Begründung nötig."
        - "Bei <strong>6 oder 12 Monaten</strong> kündigst du ebenfalls monatlich. Dein Zugang läuft bis zum Ende des laufenden Monats; nicht genutzte volle Restmonate erstatten wir anteilig."
    - q: "Kann ich vom Monats- aufs Jahresabo wechseln (oder umgekehrt)?"
      a:
        - "Ja. Du kannst zwischen 1, 6 und 12 Monaten wechseln. Nicht verbrauchte Restzeit wird dabei angerechnet oder anteilig erstattet."
    - q: "Ist EqoFlow360 als Betriebsausgabe absetzbar?"
      a:
        - "Für Sponsoren, die mit dem Abo ihre Sponsoring-Tätigkeit unterstützen, ist es in aller Regel als Betriebsausgabe absetzbar. Die Rechnung enthält alle steuerlich relevanten Angaben."
        - "Wir sind keine Steuerberater — sprich im Zweifelsfall mit deinem."
    - q: "Welche Zahlungsmethoden gibt es?"
      a:
        - "Kreditkarte (Visa, Mastercard, Amex), SEPA-Lastschrift und PayPal. Für 6- und 12-Monats-Laufzeiten zusätzlich Überweisung auf Anfrage."
    - q: "Gibt es eine kostenlose Testphase?"
      a:
        - "Ja. Der freie Zugang zeigt dir das Prinzip mit reduzierter Planungstiefe. Die volle 10-Jahres-Projektion und alle Pro-Funktionen sind in den bezahlten Laufzeiten enthalten."
    - q: "Brauche ich für jeden meiner Interessenten ein eigenes Abo?"
      a:
        - "Nein. Ein Abo ist auf dich als Sponsor lizenziert. Du nutzt es für beliebig viele Gespräche mit beliebig vielen Interessenten — auf deinen Geräten oder per geteiltem URL-Link."
        - "Wenn dein Interessent das Tool selbst nutzen möchte (nachdem er Sponsor geworden ist), schließt er ein eigenes Abo ab."
    - q: "Was passiert mit meinen Szenarien, wenn ich kündige?"
      a:
        - "Free speichert keine eigenen Szenarien. In Pro kannst du deine aktuelle Planung weiter nutzen; bei Kündigung schaltet die App nach Ablauf des Zugangs wieder in den freien Umfang."

