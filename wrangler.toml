# Cloudflare Pages config for the LifePlus API.
#
# This project contains ONLY the API (functions/*). The marketing site and
# the React app are deployed separately to IONOS at www.lifeflow360.app.
# The API itself runs at api.lifeflow360.app (CNAME -> *.pages.dev).
#
# D1, KV, and secrets are bound per-project in the Cloudflare dashboard.
# This file is mostly for local dev (`wrangler pages dev`) and as a record
# of the expected bindings.

name = "lifeflow360-api"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# functions/ contains the Pages Functions. No static assets are deployed
# from this project — IONOS serves all HTML/JS/CSS.
pages_build_output_dir = "public"

[vars]
BRAND_ID = "lifeplus"
APP_URL = "https://www.lifeflow360.app/app/"
ALLOWED_ORIGINS = "https://www.lifeflow360.app"
COOKIE_DOMAIN = ".lifeflow360.app"
PADDLE_ENV = "sandbox"
PADDLE_PRICE_MONTHLY = "pri_01ks580xcmk17mam0qp9tjkwxg"
PADDLE_PRICE_YEARLY = "pri_01ks5864k3detqr1j2v3cx7dhs"
SESSION_TTL_DAYS = "30"
MAGIC_LINK_TTL_MINUTES = "15"
DEVICE_LIMIT = "3"
MAIL_FROM = "no-reply@lifeflow360.app"
MAIL_FROM_NAME = "LifeFlow360"

[[d1_databases]]
binding = "DB"
database_name = "lifeflow360-prod"
database_id = "REPLACE_AFTER_wrangler_d1_create"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_AFTER_wrangler_kv_create"

# Secrets (set via dashboard or `wrangler pages secret put`):
#   PADDLE_API_KEY            from Paddle Developer Tools -> API Keys
#   PADDLE_WEBHOOK_SECRET     from Paddle Notifications endpoint
#   APP_SESSION_SECRET        openssl rand -hex 32
#   MAGIC_LINK_SECRET         openssl rand -hex 32
#   RESEND_API_KEY            from Resend Dashboard
