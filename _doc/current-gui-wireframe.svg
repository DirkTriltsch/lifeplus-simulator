    <rect x="0" y="0" width="680" height="240" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <!-- Y axis -->
    <line x1="40" y1="20" x2="40" y2="220" stroke="#e5e7eb"/>
    <!-- X axis -->
    <line x1="40" y1="220" x2="660" y2="220" stroke="#e5e7eb"/>
    <!-- Curve (simulated growth) -->
    <path d="M 50 215 Q 130 210 200 195 Q 290 175 370 145 Q 460 100 540 70 Q 600 50 650 35"
          fill="none" stroke="#1D9E75" stroke-width="2.5"/>
    <!-- Area fill -->
    <path d="M 50 215 Q 130 210 200 195 Q 290 175 370 145 Q 460 100 540 70 Q 600 50 650 35 L 650 220 L 50 220 Z"
          fill="#1D9E75" fill-opacity="0.12"/>
    <!-- Year labels -->
    <text x="50"  y="235" font-size="9" fill="#9ca3af" text-anchor="middle">J1</text>
    <text x="180" y="235" font-size="9" fill="#9ca3af" text-anchor="middle">J3</text>
    <text x="310" y="235" font-size="9" fill="#9ca3af" text-anchor="middle">J5</text>
    <text x="440" y="235" font-size="9" fill="#9ca3af" text-anchor="middle">J7</text>
    <text x="570" y="235" font-size="9" fill="#9ca3af" text-anchor="middle">J9</text>
    <text x="660" y="235" font-size="9" fill="#9ca3af" text-anchor="middle">J10</text>
  </g>

  <!-- Yearly Summary Table -->
  <text x="120" y="800" font-size="10" font-weight="600" fill="#6b7280">JAHRESUEBERSICHT</text>
  <g transform="translate(120, 820)">
    <!-- Header -->
    <rect x="0" y="0" width="680" height="32" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="20"  y="20" font-size="10" font-weight="600" fill="#374151">Jahr</text>
    <text x="100" y="20" font-size="10" font-weight="600" fill="#374151">Members</text>
    <text x="200" y="20" font-size="10" font-weight="600" fill="#374151">Shopper</text>
    <text x="300" y="20" font-size="10" font-weight="600" fill="#374151">Netzwerk</text>
    <text x="410" y="20" font-size="10" font-weight="600" fill="#374151">Rang</text>
    <text x="540" y="20" font-size="10" font-weight="600" fill="#374151">EUR/Monat</text>

    <!-- Rows -->
    <g font-size="11" fill="#111827">
      <rect x="0" y="32"  width="680" height="28" fill="#ffffff" stroke="#f3f4f6"/>
      <text x="20" y="50">J1</text><text x="100" y="50">5</text><text x="200" y="50">8</text>
      <text x="300" y="50">13</text><text x="410" y="50">Starter</text><text x="540" y="50">42</text>

      <rect x="0" y="60"  width="680" height="28" fill="#ffffff" stroke="#f3f4f6"/>
      <text x="20" y="78">J2</text><text x="100" y="78">23</text><text x="200" y="78">38</text>
      <text x="300" y="78">61</text><text x="410" y="78">Bronze</text><text x="540" y="78">187</text>

      <rect x="0" y="88"  width="680" height="28" fill="#ffffff" stroke="#f3f4f6"/>
      <text x="20" y="106">J3</text><text x="100" y="106">93</text><text x="200" y="106">152</text>
      <text x="300" y="106">245</text><text x="410" y="106">Silver</text><text x="540" y="106">624</text>

      <rect x="0" y="116" width="680" height="28" fill="#ffffff" stroke="#f3f4f6"/>
      <text x="20" y="134">...</text><text x="100" y="134">...</text><text x="200" y="134">...</text>
      <text x="300" y="134">...</text><text x="410" y="134">...</text><text x="540" y="134">...</text>

      <rect x="0" y="144" width="680" height="28" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="20" y="162" font-weight="700">J10</text>
      <text x="100" y="162" font-weight="700">1.286</text>
      <text x="200" y="162" font-weight="700">2.200</text>
      <text x="300" y="162" font-weight="700">3.486</text>
      <text x="410" y="162" font-weight="700">Diamond</text>
      <text x="540" y="162" font-weight="700">3.247</text>
    </g>
  </g>

  <!-- Disclaimer -->
  <text x="450" y="1240" font-size="10" fill="#9ca3af" text-anchor="middle">
    Schaetzung auf Basis des aktuell hinterlegten Verguetungsplans. Keine Garantie fuer tatsaechliche Provisionen.
  </text>

  <!-- ============ FOOTER ============ -->
  <line x1="100" y1="1320" x2="800" y2="1320" stroke="#e5e7eb"/>
  <text x="120" y="1345" font-size="11" fill="#6b7280">© 2026 LifeFlow360</text>
  <text x="600" y="1345" font-size="11" fill="#6b7280">Impressum</text>
  <text x="680" y="1345" font-size="11" fill="#6b7280">Datenschutz</text>
  <text x="760" y="1345" font-size="11" fill="#6b7280">Zur Webseite</text>

  <!-- ============ ANNOTATIONS (right side) ============ -->
  <g font-size="10" fill="#9ca3af" font-style="italic">
    <text x="105" y="125" fill="#9ca3af">5 Slider in einer Reihe (grid 5 Spalten lg)</text>
    <text x="125" y="218" fill="#9ca3af">HeroNumber - grosser EUR-Betrag</text>
    <text x="125" y="370" fill="#9ca3af">2 StatCards nebeneinander</text>
    <text x="125" y="490" fill="#9ca3af">Recharts AreaChart, 10 Jahre</text>
    <text x="125" y="795" fill="#9ca3af">Tabelle pro Jahr</text>
  </g>

  <!-- Note: alternative network page -->
  <g transform="translate(820, 100)">
    <text x="0" y="0" font-size="10" font-weight="700" fill="#374151" transform="rotate(90)">
      ALTERNATIVE: 'network' page
    </text>
  </g>
</svg>
